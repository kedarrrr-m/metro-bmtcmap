services:
  # FastAPI Web Service — Free tier on Render
  # The background poller is handled by GitHub Actions (see .github/workflows/poller.yml)
  - type: web
    name: bmtc-web
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: REDIS_URL
        sync: false  # Set this manually in Render Dashboard → Environment
      - key: BMTC_API_URL
        value: "https://metro-bmtcmap.onrender.com/api/v1/mock-bmtc"
